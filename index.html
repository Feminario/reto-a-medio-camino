<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Medio Camino — Reto Feminario</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --morado: #7E84AE;
    --morado-oscuro: #4C4F68;
    --lavanda: #CEA2DD;
    --periwinkle: #C2CBFF;
    --verde: #DFF3AF;
    --naranja: #F59356;
    --naranja-oscuro: #DD733A;
    --naranja-claro: #F7C175;
    --durazno: #FFEAD2;
    --rosa: #F9E1FF;
    --crema: #FBF8F3;
    --texto: #3A3550;
    --blanco: #FFFFFF;
  }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(160deg, var(--crema) 0%, var(--durazno) 55%, var(--periwinkle) 100%);
    color: var(--texto);
    min-height: 100vh;
    line-height: 1.55;
  }
  #app{
    max-width: 560px;
    margin: 0 auto;
    padding: 28px 20px 60px;
  }
  .banner-prueba{
    background: var(--morado-oscuro);
    color: #fff;
    text-align:center;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 14px;
  }
  .logo-header{
    display:block;
    height: 34px;
    margin: 0 auto 14px;
  }
  .titulo-reto{
    text-align:center;
    font-size: 30px;
    font-weight: 800;
    color: var(--morado-oscuro);
    margin: 0 0 4px;
  }
  .progreso{
    display:flex;
    justify-content:center;
    gap: 10px;
    margin: 18px 0 24px;
    flex-wrap: wrap;
  }
  .paso{
    display:flex;
    align-items:center;
    gap:6px;
    font-size: 13px;
    font-weight: 600;
    color: #b7a9c4;
  }
  .paso.activo{ color: var(--morado-oscuro); }
  .paso.hecho{ color: #6b8f4e; }
  .bolita{
    width:10px; height:10px; border-radius:50%;
    background:#ecdff2;
  }
  .paso.activo .bolita{ background: var(--naranja); }
  .paso.hecho .bolita{ background: #6b8f4e; }

  .card{
    background: var(--blanco);
    border-radius: 22px;
    padding: 28px 24px;
    box-shadow: 0 12px 30px rgba(76,79,104,0.14);
  }
  h2{
    color: var(--morado-oscuro);
    font-size: 22px;
    margin-top:0;
  }
  h3{
    color: var(--morado);
    font-size: 17px;
    margin-bottom: 8px;
  }
  p{ margin: 0 0 14px; }
  .lead{ font-size: 16px; }
  .icono-dia{ display:block; margin: 4px auto 14px; }
  .gancho{
    text-align:center;
    font-size: 15.5px;
    font-weight: 600;
    color: var(--morado-oscuro);
    margin-bottom: 18px;
  }
  .mini-card{
    background:#fdfaf6;
    border-left: 4px solid var(--lavanda);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
    font-size: 14.5px;
  }
  .mini-card b.rotulo{
    color: var(--morado-oscuro);
    display:block;
    margin-bottom: 3px;
    font-size: 13.5px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  label{
    display:block;
    font-weight: 700;
    font-size: 14px;
    color: var(--morado-oscuro);
    margin: 18px 0 6px;
  }
  input[type="text"], input[type="number"], input[type="email"]{
    width:100%;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1.5px solid #e7dcec;
    font-size: 15px;
    background: #fffdfb;
    font-family: inherit;
  }
  input:focus{ outline: 2px solid var(--naranja); border-color: var(--naranja); }
  .opciones{ display:flex; flex-direction:column; gap:8px; margin-top:6px; }
  .opcion{
    border: 1.5px solid #e7dcec;
    border-radius: 12px;
    padding: 12px 14px;
    cursor:pointer;
    font-size: 15px;
    transition: all .15s;
  }
  .opcion:hover{ border-color: var(--naranja); }
  .opcion.sel{
    border-color: var(--naranja);
    background: var(--durazno);
    font-weight: 700;
    color: var(--morado-oscuro);
  }
  .btn{
    display:inline-block;
    width:100%;
    text-align:center;
    background: var(--naranja);
    color: #fff;
    border:none;
    padding: 15px 18px;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 700;
    cursor:pointer;
    margin-top: 22px;
    transition: transform .1s, background .15s;
    text-decoration:none;
    font-family: inherit;
  }
  .btn:hover{ background: var(--naranja-oscuro); }
  .btn:active{ transform: scale(0.98); }
  .btn.secundario{
    background: transparent;
    color: var(--morado-oscuro);
    border: 1.5px solid var(--morado);
  }
  .btn.secundario:hover{ background: var(--rosa); }
  .btn.whatsapp{ background:#3fa25a; }
  .btn.whatsapp:hover{ background:#33843f; }
  .btn[disabled]{ opacity:0.5; cursor:not-allowed; }

  .resultado{
    background: linear-gradient(135deg, var(--durazno), var(--rosa));
    border-radius: 16px;
    padding: 20px;
    margin: 18px 0;
    border: 1px solid var(--naranja-claro);
  }
  .arquetipo{
    font-size: 20px;
    font-weight: 800;
    color: var(--morado-oscuro);
    margin-bottom: 6px;
  }
  .accion{
    background: var(--periwinkle);
    border-left: 4px solid var(--morado);
    padding: 14px 16px;
    border-radius: 10px;
    font-size: 14.5px;
    margin: 16px 0;
    color: var(--morado-oscuro);
  }
  .countdown-wrap{ text-align:center; padding: 10px 0 4px; }
  .countdown{
    display:flex;
    justify-content:center;
    gap: 14px;
    margin: 18px 0 6px;
  }
  .countdown div{
    background: var(--morado-oscuro);
    color: #fff;
    border-radius: 14px;
    padding: 14px 10px;
    min-width: 62px;
  }
  .countdown .num{ font-size: 26px; font-weight: 800; display:block; }
  .countdown .lbl{ font-size: 11px; text-transform:uppercase; letter-spacing:1px; opacity:0.8; }
  .footer-nota{
    text-align:center;
    font-size: 12.5px;
    color: #a996b3;
    margin-top: 26px;
  }
  .badge-canvas{
    display:block;
    width: 100%;
    max-width: 340px;
    margin: 10px auto;
    border-radius: 18px;
    box-shadow: 0 10px 24px rgba(76,79,104,0.22);
  }
  .foto-final{
    display:flex;
    flex-direction:column;
    gap: 10px;
    margin: 14px 0 20px;
  }
  .foto-final .item{
    background:#fff;
    border:1px solid #e7dcec;
    border-radius:12px;
    padding: 12px 14px;
    font-size: 14.5px;
  }
  .foto-final .item b{ color: var(--morado); }
  .club365{
    background: var(--morado-oscuro);
    color: var(--periwinkle);
    border-radius: 18px;
    padding: 24px 22px;
    margin-top: 10px;
  }
  .club365 h3{ color: var(--naranja-claro); }
  .club365 p{ color: #e4e1f2; }
  .club365 .btn{ background: var(--naranja); color:#fff; }
  small.help{ display:block; color:#a996b3; font-size:12.5px; margin-top:-8px; margin-bottom:14px; }

  /* Acordeón "Tus opciones reales" */
  .seccion-opciones{ margin: 22px 0; }
  .seccion-opciones > .titulo-seccion{
    font-weight:800; color: var(--morado-oscuro); font-size:16px; margin-bottom:4px;
  }
  .seccion-opciones > .subtitulo-seccion{
    font-size: 13.5px; color:#8b7d97; margin-bottom:12px;
  }
  .acordeon{
    border: 1.5px solid #e7dcec;
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .acordeon-cabeza{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    padding: 13px 15px;
    cursor:pointer;
    background:#fff;
    font-weight:700;
    color: var(--morado-oscuro);
    font-size: 14.5px;
  }
  .acordeon-cabeza .der{ display:flex; align-items:center; gap:8px; flex-shrink:0; }
  .acordeon-cabeza .tasa{
    color: var(--naranja-oscuro);
    font-weight:800;
    font-size: 12.5px;
    white-space:nowrap;
    background: var(--durazno);
    padding: 3px 8px;
    border-radius: 20px;
  }
  .acordeon-flecha{ transition: transform .2s; font-size:13px; color:var(--morado); }
  .acordeon-cabeza.abierta .acordeon-flecha{ transform: rotate(180deg); }
  .acordeon-cuerpo{
    max-height:0;
    overflow:hidden;
    transition: max-height .25s ease;
    background:#fdfaf6;
    padding: 0 15px;
    font-size: 14px;
  }
  .acordeon-cuerpo.abierto{ padding: 12px 15px 15px; }

  .nota-fuente{
    font-size: 11.5px;
    color:#a996b3;
    margin-top: 8px;
    line-height:1.45;
  }

  /* Simuladores interactivos */
  .simulador{
    background: var(--periwinkle);
    border-radius: 16px;
    padding: 20px;
    margin: 20px 0 6px;
  }
  .simulador h3{ color: var(--morado-oscuro); margin-top:0; }
  .simulador p.explicacion{ font-size:13.5px; color:var(--morado-oscuro); }
  .slider-row{ margin: 16px 0 6px; }
  .slider-row input[type=range]{ width:100%; accent-color: var(--naranja); }
  .slider-valor{
    font-weight:800;
    color: var(--morado-oscuro);
    font-size: 22px;
    text-align:center;
    margin-bottom: 2px;
  }
  .simulador-resultado{
    background:#fff;
    border-radius:12px;
    padding: 14px 16px;
    margin-top: 12px;
    font-size: 14px;
    line-height:1.6;
  }
  .simulador-resultado b{ color: var(--naranja-oscuro); }
</style>
</head>

/* ============================================================
   ESTADO — se guarda en localStorage del navegador de la
   participante. El respaldo real de todas las respuestas vive
   en tu Google Sheet (ver SHEET_WEBAPP_URL arriba).
   ============================================================ */
const STORAGE_KEY = "amc_participante";

function getState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  }catch(e){ return null; }
}
function saveState(state){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function enviarABaseDeDatos(payload){
  if(!SHEET_WEBAPP_URL) { console.log("[A Medio Camino] Sin SHEET_WEBAPP_URL configurada. Datos solo guardados localmente:", payload); return; }
  fetch(SHEET_WEBAPP_URL, {
    method: "POST",
    mode: "no-cors",
    headers: {"Content-Type":"text/plain"},
    body: JSON.stringify(payload)
  }).catch(err => console.log("[A Medio Camino] Error al enviar a la base de datos:", err));
}

   UTILIDADES
   ============================================================ */
function cop(n){
  n = Number(n) || 0;
  return "$" + Math.round(n).toLocaleString("es-CO");
}
function pad(n){ return String(n).padStart(2,"0"); }

function iniciarCountdown(target, elId, onDone){
  function tick(){
    const now = new Date();
    let diff = target - now;
    if(diff <= 0){ onDone(); return; }
    const d = Math.floor(diff/86400000); diff -= d*86400000;
    const h = Math.floor(diff/3600000); diff -= h*3600000;
    const m = Math.floor(diff/60000); diff -= m*60000;
    const s = Math.floor(diff/1000);
    const el = document.getElementById(elId);
    if(!el) return;
    el.innerHTML = `
      <div><span class="num">${pad(d)}</span><span class="lbl">días</span></div>
      <div><span class="num">${pad(h)}</span><span class="lbl">horas</span></div>
      <div><span class="num">${pad(m)}</span><span class="lbl">min</span></div>
      <div><span class="num">${pad(s)}</span><span class="lbl">seg</span></div>
    `;
    setTimeout(tick, 1000);
  }
  tick();
}

}

/* ============================================================
   ACORDEÓN — "Tus opciones reales"
   ============================================================ */
let acordeonContador = 0;
function acordeon(titulo, tasa, contenidoHtml){
  acordeonContador++;
  const id = "ac" + acordeonContador;
  return `
    <div class="acordeon">
      <div class="acordeon-cabeza" id="cabeza-${id}" onclick="toggleAcordeon('${id}')">
        <span>${titulo}</span>
        <span class="der"><span class="tasa">${tasa}</span><span class="acordeon-flecha">▾</span></span>
      </div>
      <div class="acordeon-cuerpo" id="cuerpo-${id}">${contenidoHtml}</div>
    </div>
  `;
}
function toggleAcordeon(id){
  const cuerpo = document.getElementById("cuerpo-"+id);
  const cabeza = document.getElementById("cabeza-"+id);
  const abrir = !cuerpo.classList.contains("abierto");
  cuerpo.classList.toggle("abierto", abrir);
  cabeza.classList.toggle("abierta", abrir);
  cuerpo.style.maxHeight = abrir ? (cuerpo.scrollHeight+20)+"px" : "0px";
}

    const hecho = state && state["day"+i];
    const cls = hecho ? "hecho" : (i===diaActivo ? "activo":"");
    html += `<div class="paso ${cls}"><span class="bolita"></span> Día ${i} · ${nombres[i-1]}</div>`;
  }
  html += "</div>";
  return html;
}

function actualizarSimD1(){
  const el = document.getElementById("sim1-monto");
  if(!el) return;
  const monto = Number(el.value);
  document.getElementById("sim1-monto-label").textContent = cop(monto) + " al mes";
  const meta = respD1.gasto*3;
  const falta = Math.max(0, meta - respD1.ahorro);
  let mensaje;
  if(monto <= 0){
    mensaje = "Mueve la barra para ver en cuánto tiempo completas tu meta de 3 meses.";
  } else if(falta <= 0){
    mensaje = `¡Ya tienes tu meta de 3 meses completa! Con <b>${cop(monto)}</b> al mes de más, ese dinero podría empezar a ir directo a inversión (día 3).`;
  } else {
    const meses = Math.ceil(falta/monto);
    const fechaMeta = new Date();
    fechaMeta.setMonth(fechaMeta.getMonth()+meses);
    const fechaTxt = fechaMeta.toLocaleDateString("es-CO", { month:"long", year:"numeric" });
    const tasaAlta = 0.08;
    const interesGanado = Math.round(falta * (tasaAlta/12) * (meses/2));
    mensaje = `Ahorrando <b>${cop(monto)}</b> al mes, completas tu Fondo de Autonomía de 3 meses en <b>${meses} meses</b> (${fechaTxt}). Si en vez de una cuenta tradicional lo guardas en una de alto rendimiento, además podrías ganar unos <b>${cop(interesGanado)}</b> extra en el camino — solo por elegir bien dónde lo guardas.`;
  }
  document.getElementById("sim1-resultado").innerHTML = mensaje;
}

function simularPago(deuda, r, pago){
  let saldo = deuda, meses = 0, interesTotal = 0;
  while(saldo > 0 && meses < 600){
    const interes = saldo*r;
    if(pago <= interes) return null;
    interesTotal += interes;
    saldo = saldo + interes - pago;
    meses++;
  }
  return { meses, interesTotal: Math.round(interesTotal) };
}

  const base = simularPago(deuda, r, pagoMinimo);
  let html = `Pagando solo el mínimo estimado (<b>${cop(pagoMinimo)}</b>/mes): `;
  html += base ? `terminas en <b>${base.meses} meses</b> y pagas cerca de <b>${cop(base.interesTotal)}</b> solo en intereses.` : `con esa tasa, el mínimo casi no alcanza a bajar el capital — nunca terminarías de pagar.`;
  if(extra > 0){

    html += `<br><br>Agregando <b>${cop(extra)}</b> extra al mes (total ${cop(pagoMinimo+extra)}): `;
    html += conExtra ? `terminas en <b>${conExtra.meses} meses</b> y pagas cerca de <b>${cop(conExtra.interesTotal)}</b> en intereses.` : `todavía no alcanza para pagarla del todo — sube un poco más el abono.`;
    if(base && conExtra){

      if(ahorro > 0) html += `<br><br>Eso son <b>${cop(ahorro)}</b> menos en intereses y salir <b>${mesesGanados} meses</b> antes.`;
    }
  }
  document.getElementById("sim2-resultado").innerHTML = html;
}

function iniciarCountdownBackstage(){
  function tick(){
    const el = document.getElementById("cd-backstage");
    if(!el) return;
    const now = new Date();
    let diff = BACKSTAGE_FECHA - now;
    if(diff <= 0){
      el.innerHTML = `<div style="min-width:140px;"><span class="num" style="font-size:19px;">¡Es hoy!</span></div>`;
      return;
    }
    const d = Math.floor(diff/86400000); diff -= d*86400000;
    const h = Math.floor(diff/3600000); diff -= h*3600000;
    const m = Math.floor(diff/60000); diff -= m*60000;
    const s = Math.floor(diff/1000);
    el.innerHTML = `
      <div><span class="num">${pad(d)}</span><span class="lbl">días</span></div>
      <div><span class="num">${pad(h)}</span><span class="lbl">horas</span></div>
      <div><span class="num">${pad(m)}</span><span class="lbl">min</span></div>
      <div><span class="num">${pad(s)}</span><span class="lbl">seg</span></div>
    `;
    setTimeout(tick, 1000);
  }
  tick();
}

function textoAjustado(ctx, texto, maxWidth, tamanoBase, peso){
  let tamano = tamanoBase;
  ctx.font = `${peso} ${tamano}px Montserrat, Georgia, serif`;
  while(ctx.measureText(texto).width > maxWidth && tamano > 14){
    tamano -= 1;
    ctx.font = `${peso} ${tamano}px Montserrat, Georgia, serif`;
  }
  return tamano;
}
function envolverTexto(ctx, texto, maxWidth){
  const palabras = texto.split(" ");
  const lineas = [];
  let actual = "";
  palabras.forEach(p=>{
    const prueba = actual ? actual + " " + p : p;
    if(ctx.measureText(prueba).width > maxWidth && actual){
      lineas.push(actual);
      actual = p;
    } else {
      actual = prueba;
    }
  });
  if(actual) lineas.push(actual);
  return lineas;
}

function dibujarInsignia(state){
  const c = document.getElementById("insignia");
  if(!c) return;
  if(!logoBlancoImg.complete || logoBlancoImg.naturalWidth === 0){
    logoBlancoImg.onload = () => dibujarInsignia(state);
    return;
  }
  const ctx = c.getContext("2d");
  const w = c.width, h = c.height;
  const anchoMax = 600; // ancho seguro dentro del círculo

  const grad = ctx.createLinearGradient(0,0,w,h);
  grad.addColorStop(0, "#4C4F68");
  grad.addColorStop(1, "#7E84AE");
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,w,h);

  ctx.strokeStyle = "#F7C175";
  ctx.lineWidth = 10;
  ctx.beginPath();
  ctx.arc(w/2, h/2, 360, 0, Math.PI*2);
  ctx.stroke();

  ctx.textAlign = "center";

  // logo blanco
  const logoW = 210;
  const logoH = logoW * (logoBlancoImg.naturalHeight / logoBlancoImg.naturalWidth);
  ctx.drawImage(logoBlancoImg, w/2 - logoW/2, 150, logoW, logoH);

  ctx.fillStyle = "#fffaf5";
  textoAjustado(ctx, "A Medio Camino", anchoMax, 46, 800);
  ctx.fillText("A Medio Camino", w/2, 150 + logoH + 60);

  ctx.font = "400 22px Montserrat, Georgia, serif";
  ctx.fillStyle = "#F9E1FF";
  ctx.fillText("completó el reto de 3 días", w/2, 150 + logoH + 100);

  ctx.fillStyle = "#F59356";
  textoAjustado(ctx, state.nombre, anchoMax, 42, 800);
  ctx.fillText(state.nombre, w/2, 150 + logoH + 175);

  const frase = (state.quote && state.quote.texto) ? state.quote : elegirFraseAleatoria();
  ctx.font = "italic 700 26px Montserrat, Georgia, serif";
  ctx.fillStyle = "#fffaf5";
  const lineasFrase = envolverTexto(ctx, `"${frase.texto}"`, anchoMax);
  let yFrase = 150 + logoH + 235;
  lineasFrase.forEach(linea=>{
    ctx.fillText(linea, w/2, yFrase);
    yFrase += 34;
  });

  ctx.font = "700 18px Montserrat, Georgia, serif";
  ctx.fillStyle = "#F59356";
  ctx.fillText("— " + frase.autora, w/2, yFrase + 14);

  const fecha = new Date().toLocaleDateString("es-CO", { day:"numeric", month:"long", year:"numeric" });
  ctx.font = "400 18px Montserrat, Georgia, serif";
  ctx.fillStyle = "#d8cfe0";
  ctx.fillText(fecha, w/2, 745);
}
function descargarInsignia(){
  const c = document.getElementById("insignia");
  const link = document.createElement("a");
  link.download = "insignia-a-medio-camino.png";
  link.href = c.toDataURL("image/png");
  link.click();
}
function copiarCaptionIG(){
  const state = getState();
  const frase = state && state.quote ? state.quote : elegirFraseAleatoria();
  const texto = `Completé los 3 días del reto A Medio Camino de @feminario 💜\n\n"${frase.texto}" — ${frase.autora}\n\nMiré mi ahorro, mi deuda y mi inversión de frente — sin pena, sin excusas. Si tú también quieres tu foto financiera de mitad de año, el reto sigue abierto unos días más 👉 en mi bio.\n\n#AMedioCamino #Feminario #EducaciónFinanciera`;
  navigator.clipboard.writeText(texto).then(()=>{
    alertaSuave("Texto copiado — ¡listo para pegar en tu post! 📋");
  }).catch(()=>{
    alertaSuave("No pudimos copiar automático, copia el texto manualmente.");
  });
}

/* ============================================================
   RENDER PRINCIPAL — decide qué pantalla mostrar
   ============================================================ */
function render(){
  const state = getState();
  const now = new Date();

  if(!state){ pantallaIntro(); return; }

  if(!state.day1){
    if(!TEST_MODE && now < UNLOCK[1]){ pantallaEspera(state, 1); return; }
    pantallaDia1(state);
    return;
  }
  if(!state.day2){
    if(!TEST_MODE && now < UNLOCK[2]){ pantallaEspera(state, 2, `<p style="color:#6b8f4e; font-weight:700;">¡Día 1 completado! 🎉</p>`); return; }
    if(!state.identConfirmadaDia2){ pantallaIdentificacionDia(state, 2, pantallaDia2); return; }
    pantallaDia2(state);
    return;
  }
  if(!state.day3){
    if(!TEST_MODE && now < UNLOCK[3]){ pantallaEspera(state, 3, `<p style="color:#6b8f4e; font-weight:700;">¡Día 2 completado! 🎉</p>`); return; }
    if(!state.identConfirmadaDia3){ pantallaIdentificacionDia(state, 3, pantallaDia3); return; }
    pantallaDia3(state);
    return;
  }
  pantallaFinal(state);
}

render();
</script>
